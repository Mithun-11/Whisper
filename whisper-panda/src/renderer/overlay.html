<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>WhisperPanda Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            background: transparent !important;
            overflow: hidden;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            user-select: none;
            -webkit-app-region: no-drag;
        }

        /* ── Pill container ── */
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 11px 22px 11px 18px;
            border-radius: 999px;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            animation: rise 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes rise {
            from {
                transform: scale(0.72) translateY(8px);
                opacity: 0;
            }

            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        /* ── LISTENING ── */
        .pill.listening {
            background: rgba(18, 6, 6, 0.82);
            border: 1px solid rgba(220, 60, 60, 0.28);
            box-shadow:
                0 8px 32px rgba(200, 40, 40, 0.22),
                inset 0 1px 0 rgba(255, 100, 100, 0.08);
        }

        /* Audio wave bars */
        .wave {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 18px;
        }

        .wave span {
            display: block;
            width: 3px;
            border-radius: 3px;
            background: #e04040;
            box-shadow: 0 0 6px rgba(220, 50, 50, 0.6);
            animation: wave-bar 1.1s ease-in-out infinite;
            transform-origin: center bottom;
        }

        .wave span:nth-child(1) {
            height: 5px;
            animation-delay: 0.0s;
        }

        .wave span:nth-child(2) {
            height: 14px;
            animation-delay: 0.15s;
        }

        .wave span:nth-child(3) {
            height: 18px;
            animation-delay: 0.05s;
        }

        .wave span:nth-child(4) {
            height: 10px;
            animation-delay: 0.25s;
        }

        .wave span:nth-child(5) {
            height: 6px;
            animation-delay: 0.1s;
        }

        @keyframes wave-bar {

            0%,
            100% {
                transform: scaleY(0.35);
                opacity: 0.5;
            }

            50% {
                transform: scaleY(1);
                opacity: 1;
            }
        }

        .pill.listening .label {
            color: #f07070;
        }

        .pill.listening .sub {
            color: rgba(230, 110, 110, 0.45);
        }

        /* ── READY ── */
        .pill.ready {
            background: rgba(6, 18, 10, 0.84);
            border: 1px solid rgba(60, 200, 100, 0.28);
            box-shadow:
                0 8px 32px rgba(40, 180, 80, 0.18),
                inset 0 1px 0 rgba(80, 220, 120, 0.07);
        }

        /* Checkmark icon */
        .check-wrap {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .check-wrap svg {
            animation: pop-check 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes pop-check {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .pill.ready .label {
            color: #60d080;
        }

        .pill.ready .sub {
            color: rgba(90, 200, 120, 0.42);
        }

        .pill.ready .divider {
            background: #3ecf6e;
        }

        /* ── TRANSCRIBING ── */
        .pill.transcribing {
            background: rgba(8, 8, 22, 0.86);
            border: 1px solid rgba(110, 80, 240, 0.28);
            box-shadow:
                0 8px 32px rgba(80, 60, 220, 0.2),
                inset 0 1px 0 rgba(150, 120, 255, 0.07);
        }

        /* Arc spinner */
        .arc-wrap {
            width: 20px;
            height: 20px;
            position: relative;
            flex-shrink: 0;
        }

        .arc-wrap svg {
            width: 100%;
            height: 100%;
            animation: arc-spin 1s linear infinite;
        }

        @keyframes arc-spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Three dots inside arc */
        .arc-dots {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .arc-dots span {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #907fff;
            animation: dot-pulse 1s ease-in-out infinite;
        }

        .arc-dots span:nth-child(1) {
            animation-delay: 0s;
        }

        .arc-dots span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .arc-dots span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes dot-pulse {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .pill.transcribing .label {
            color: #a088f8;
        }

        .pill.transcribing .sub {
            color: rgba(160, 130, 248, 0.42);
        }

        /* ── LOADING (model reloading from idle) ── */
        .pill.loading {
            background: rgba(20, 14, 4, 0.86);
            border: 1px solid rgba(200, 150, 40, 0.28);
            box-shadow:
                0 8px 32px rgba(180, 130, 30, 0.18),
                inset 0 1px 0 rgba(220, 170, 60, 0.07);
        }

        .pill.loading .arc-wrap svg {
            animation: arc-spin 1.5s linear infinite;
        }

        .pill.loading .arc-wrap svg path { stroke: #d4a030; }
        .pill.loading .arc-wrap svg circle { stroke: rgba(200,150,40,0.15); }
        .pill.loading .arc-dots span { background: #c8962a; }
        .pill.loading .label { color: #d4a030; }
        .pill.loading .sub   { color: rgba(200, 150, 40, 0.45); }
        .pill.loading .divider { background: #c8962a; }

        /* ── NO MIC ── */
        .pill.no-mic {
            background: rgba(22, 12, 2, 0.88);
            border: 1px solid rgba(230, 120, 40, 0.34);
            box-shadow:
                0 8px 32px rgba(190, 100, 24, 0.22),
                inset 0 1px 0 rgba(255, 160, 80, 0.08);
        }

        .pill.no-mic .label { color: #ffa255; }
        .pill.no-mic .sub   { color: rgba(255, 170, 96, 0.55); }
        .pill.no-mic .divider { background: #ff9b45; }

        /* ── MIC DENIED ── */
        .pill.mic-denied {
            background: rgba(20, 4, 8, 0.88);
            border: 1px solid rgba(230, 80, 120, 0.34);
            box-shadow:
                0 8px 32px rgba(180, 30, 70, 0.22),
                inset 0 1px 0 rgba(255, 120, 150, 0.08);
        }

        .pill.mic-denied .label { color: #ff6d93; }
        .pill.mic-denied .sub   { color: rgba(255, 132, 165, 0.58); }
        .pill.mic-denied .divider { background: #ff5e8a; }

        /* ── Text ── */
        .text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .label {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.05px;
            line-height: 1;
        }

        .sub {
            font-size: 9.5px;
            font-weight: 400;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        /* Thin separator line between icon and text */
        .divider {
            width: 1px;
            height: 22px;
            opacity: 0.15;
            border-radius: 1px;
        }

        .pill.listening .divider {
            background: #e04040;
        }

        .pill.transcribing .divider {
            background: #907fff;
        }
    </style>
</head>

<body>
    <div class="pill listening" id="pill">

        <!-- LISTENING: audio wave bars -->
        <div class="wave" id="wave">
            <span></span><span></span><span></span><span></span><span></span>
        </div>

        <!-- TRANSCRIBING: arc spinner (hidden by default) -->
        <div class="arc-wrap" id="arc" style="display:none">
            <svg viewBox="0 0 20 20" fill="none">
                <circle cx="10" cy="10" r="8" stroke="rgba(140,110,255,0.2)" stroke-width="2" />
                <path d="M10 2 A8 8 0 0 1 18 10" stroke="#a088f8" stroke-width="2" stroke-linecap="round" />
            </svg>
            <div class="arc-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- READY: checkmark (hidden by default) -->
        <div class="check-wrap" id="check" style="display:none">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3ecf6e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>

        <div class="divider" id="divider"></div>

        <div class="text">
            <span class="label" id="label">Listening</span>
            <span class="sub" id="sub">Speak now</span>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron')
        const pill  = document.getElementById('pill')
        const wave  = document.getElementById('wave')
        const arc   = document.getElementById('arc')
        const check = document.getElementById('check')
        const label = document.getElementById('label')
        const sub   = document.getElementById('sub')

        function setMode(status) {
            // Re-trigger entrance animation
            pill.style.animation = 'none'
            void pill.offsetHeight
            pill.style.animation = ''

            if (status === 'ready') {
                pill.className = 'pill ready'
                wave.style.display = 'none'
                arc.style.display = 'none'
                check.style.display = 'flex'
                label.textContent = 'Ready'
                sub.textContent = 'Model loaded'
            } else if (status === 'recording') {
                pill.className = 'pill listening'
                wave.style.display = 'flex'
                arc.style.display = 'none'
                check.style.display = 'none'
                label.textContent = 'Listening'
                sub.textContent = 'Speak now'
            } else if (status === 'loading') {
                pill.className = 'pill loading'
                wave.style.display  = 'none'
                arc.style.display   = 'flex'
                check.style.display = 'none'
                label.textContent   = 'Loading'
                sub.textContent     = 'Reloading model…'
            } else if (status === 'no-mic') {
                pill.className = 'pill no-mic'
                wave.style.display  = 'none'
                arc.style.display   = 'none'
                check.style.display = 'none'
                label.textContent   = 'No mic connected'
                sub.textContent     = 'Connect a microphone'
            } else if (status === 'mic-denied') {
                pill.className = 'pill mic-denied'
                wave.style.display  = 'none'
                arc.style.display   = 'none'
                check.style.display = 'none'
                label.textContent   = 'Microphone blocked'
                sub.textContent     = 'Allow mic permission'
            } else {
                pill.className = 'pill transcribing'
                wave.style.display  = 'none'
                arc.style.display   = 'flex'
                check.style.display = 'none'
                label.textContent   = 'Transcribing'
                sub.textContent     = 'Processing audio'
            }
        }

        ipcRenderer.on('overlay-status', (_e, status) => setMode(status))
    </script>
</body>

</html>
